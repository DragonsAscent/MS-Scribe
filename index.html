<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Scribe</title>
<style>
  body, html { margin:0; padding:0; height:100%; display:flex; flex-direction:column; font-family:sans-serif; }
  #editor { flex:1; }
  #status { padding:8px; background:#1e1e1e; color:#d4d4d4; font-family:monospace; }
</style>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.40.0/min/vs/loader.js"></script>
</head>
<body>
<div id="editor"></div>
<div id="status">Loading editor...</div>

<script>
require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.40.0/min/vs' }});

function startMonacoIfYamlReady() {
  if (typeof jsyaml === 'undefined' && typeof window.jsyaml === 'undefined') {
    setTimeout(startMonacoIfYamlReady, 100);
    return;
  }
  require(['vs/editor/editor.main'], function() {
    const statusEl = document.getElementById('status');
    let schema = {};

    fetch('schema.json')
      .then(res => res.json())
      .then(data => {
        schema = data;
        statusEl.textContent = 'Schema loaded ✅';
        statusEl.style.color = '#0f0';
      })
      .catch(err => {
        console.error(err);
        statusEl.textContent = 'Failed to load schema ❌';
        statusEl.style.color = '#f44';
      });

    const editor = monaco.editor.create(document.getElementById('editor'), {
      value: `# Start typing your spell YAML here\nbasic-spell:\n  spell-class: ".instant.DummySpell"`,
      language: 'yaml',
      theme: 'vs-dark',
      automaticLayout: true
    });

    function findParentKey(model, lineNumber) {
      for (let i = lineNumber - 1; i > 0; i--) {
        const line = model.getLineContent(i).trim();
        const match = line.match(/^([\w-]+):/);
        if (match && !line.startsWith('-')) {
          if (i !== 1) return match[1];
        }
      }
      return null;
    }

    monaco.languages.registerHoverProvider('yaml', {
      provideHover: function(model, position) {
        const word = model.getWordAtPosition(position);
        // If Monaco word splitting breaks on hyphen, extract a full key including hyphens
        function getFullKey() {
          const line = model.getLineContent(position.lineNumber);
          const col = position.column - 1; // zero-based index
          if (col < 0 || col > line.length) return word ? word.word : null;
          // allowed key chars: letters, numbers, underscore, hyphen
          const isKeyChar = c => /[A-Za-z0-9_\-]/.test(c);
          let left = col;
          // If cursor is on whitespace between key and value, try to use word
          if (!isKeyChar(line[left])) {
            if (word && word.word) return word.word;
            return null;
          }
          // expand left
          while (left - 1 >= 0 && isKeyChar(line[left - 1])) left--;
          let right = col;
          while (right + 1 < line.length && isKeyChar(line[right + 1])) right++;
          return line.substring(left, right + 1);
        }

        const key = getFullKey();
        if (!key) return null;

        const line = model.getLineContent(position.lineNumber);

        // Helper: get YAML-parsed object
        function parseYaml() {
          try {
            const yamlLib = typeof jsyaml !== 'undefined' ? jsyaml : window.jsyaml;
            if (!yamlLib) return null;
            return yamlLib.load(model.getValue()) || {};
          } catch (e) {
            return null;
          }
        }

        // Case 1: hovering over a spell-class value
        const spellClassLineMatch = line.match(/spell-class\s*:\s*['\"]?([.a-zA-Z0-9]+)['\"]?/);
        if (spellClassLineMatch && line.includes(key)) {
          const classStr = spellClassLineMatch[1];
          const parts = classStr.split('.').filter(Boolean);
          const className = parts[parts.length - 1];
          if (schema[className]) {
            const opts = schema[className].options || {};
            const keys = Object.keys(opts).slice(0, 8);
            const contents = [{ value: `**${className}** (${parts[0] ?? 'unknown'})` }];
            if (keys.length) contents.push({ value: `Options: ${keys.join(', ')}` });
            return {
              range: new monaco.Range(position.lineNumber, word.startColumn, position.lineNumber, word.endColumn),
              contents
            };
          }
        }

        // Case 2: hovering over an option inside a spell instance - find instance's spell-class
        const parentKey = findParentKey(model, position.lineNumber);
        if (parentKey) {
          const doc = parseYaml();
          if (doc && doc[parentKey]) {
            const inst = doc[parentKey];
            const sc = inst['spell-class'] || inst['spell_class'] || inst['class'];
            if (sc && typeof sc === 'string') {
              const classParts = sc.split('.').filter(Boolean);
              const className = classParts[classParts.length - 1];
              if (schema[className]) {
                const options = schema[className].options || {};
                if (options[key]) {
                  const opt = options[key];
                  return {
                    range: new monaco.Range(position.lineNumber, word.startColumn, position.lineNumber, word.endColumn),
                    contents: [
                      { value: `**${word.word}** (${opt.type})` },
                      { value: `${opt.description}` },
                      { value: `Default: ${opt.default ?? 'none'}` }
                    ]
                  };
                }
              }
            }
          }
        }

        // Fallback: global option lookup across all spells (unchanged)
        for (const spellName in schema) {
          const options = schema[spellName].options;
          if (options && options[key]) {
            const opt = options[key];
            return {
              range: new monaco.Range(position.lineNumber, word.startColumn, position.lineNumber, word.endColumn),
              contents: [
                { value: `**${key}** (${opt.type})` },
                { value: `${opt.description}` },
                { value: `Default: ${opt.default ?? 'none'}` }
              ]
            };
          }
        }

        return null;
      }
    });

    editor.onDidChangeModelContent(() => {
      const yamlText = editor.getValue();
      try {
        const yamlLib = typeof jsyaml !== 'undefined' ? jsyaml : window.jsyaml;
        if (!yamlLib) throw new Error('jsyaml is not defined');
        yamlLib.load(yamlText);
        statusEl.textContent = 'Config is valid ✅';
        statusEl.style.color = '#0f0';
      } catch (err) {
        statusEl.textContent = 'Error ❌: ' + err.message;
        statusEl.style.color = '#f44';
      }
    });
  });
}
startMonacoIfYamlReady();
</script>
</body>
</html>
