<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Scribe</title>
<style>
  body, html { margin:0; padding:0; height:100%; display:flex; flex-direction:column; font-family:sans-serif; }
  #editor { flex:1; position: relative; }
  /* ensure Monaco content renders above decorative backgrounds */
  #editor .monaco-editor { position: relative; z-index: 2; }
  #status {
    position: fixed;
    right: 16px;
    bottom: 16px;
    max-width: 480px;
    max-height: 240px;
    overflow: auto;
    padding: 12px 14px;
    background: rgba(30,30,30,0.95);
    color: #d4d4d4;
    font-family: monospace;
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    white-space: pre-wrap;
    z-index: 10000;
    font-size: 13px;
  }
  /* Inline token style with embedded icon inside the highlighted background */
  .monaco-editor .spell-class-token {
    position: relative;
    z-index: 1; /* ensure text is above the decorative pseudo-element */
    color: hsl(263, 100%, 71%) !important;
    font-weight: 500;
    background-color: rgba(164, 107, 255, 0.13) !important;
    border-radius: 4px;
    /* Icon is rendered via ::before (absolute) so it doesn't change text layout or caret placement */
    padding-right: 0 !important;
    line-height: 18px;
  }
  /* Percent-wrapped token (e.g., %arg:4:1%) */
  .monaco-editor .percent-token {
    position: relative;
    color: rgb(173, 114, 114) !important;
    background-color: rgba(235, 149, 149, 0.03) !important;
    /* repeating diagonal stripe pattern for better contrast */
    background-image: repeating-linear-gradient(45deg,
      rgba(231, 119, 119, 0.1) 0px, rgba(231, 119, 119, 0.1) 4px,
      rgba(43, 43, 43, 0.02) 4px, rgba(43, 43, 43, 0.02) 8px);
    background-size: 8px 8px;
    border-radius: 4px;
    box-shadow: inset 0 0 0 1px rgba(177, 130, 130, 0.18) !important;
    text-shadow: 0 0 8px rgba(151, 81, 81, 0.205);
    /* remove padding to avoid shifting the caret; visual accents should be absolute so they don't affect layout */
    padding-right: 0 !important;
  }
  /* %var tokens: bluish purple background */
  .monaco-editor .percent-var {
    position: relative;
    color: rgb(158, 130, 224) !important;
    background-color: rgba(150,120,255,0.12) !important;
    background-image: repeating-linear-gradient(45deg,
      rgba(150,120,255,0.10) 0px, rgba(150,120,255,0.10) 4px,
      rgba(29, 29, 29, 0.02) 4px, rgba(29, 29, 29, 0.02) 8px);
    background-size: 8px 8px;
    border-radius: 4px;
    box-shadow: inset 0 0 0 1px rgba(86,55,196,0.18) !important;
    padding-right: 0 !important;
  }
  /* %papi tokens: navy blue background */
  .monaco-editor .percent-papi {
    position: relative;
    color: rgb(103, 148, 182) !important;
    background-color: rgba(100,150,255,0.12) !important;
    background-image: repeating-linear-gradient(45deg,
      rgba(100,150,255,0.10) 0px, rgba(100,150,255,0.10) 4px,
      rgba(29, 29, 29, 0.02) 4px, rgba(29, 29, 29, 0.02) 8px);
    background-size: 8px 8px;
    border-radius: 4px;
    box-shadow: inset 0 0 0 1px rgba(30,80,160,0.18) !important;
    padding-right: 0 !important;
  }
  /* First-line spell name token */
  .monaco-editor .spell-name-token {
    color: rgb(117, 161, 148) !important;
    font-weight: 700;
    background-color: rgba(87, 87, 87, 0.103) !important;
    position: relative;
    /* keep background-free so text layout is exact; we render the hat via ::before */
    border-radius: 4px !important;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.6) !important;
  }
  .monaco-editor .spell-class-token::before {
    content: "";
    position: absolute;
    /* background box placed to the left of the token; height matches token line height */
    left: -8px; /* moved right so the icon no longer overlaps the ':' and sits closer to the value */
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    background-color: rgba(164, 107, 255, 0.13);
    border-radius: 6px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25) !important;
    pointer-events: none;
    z-index: 0;
    /* use the provided witch-hat image; size to fill the pseudo-element height */
    background-image: url("https://static.vecteezy.com/system/resources/previews/022/906/948/non_2x/witch-hat-in-pixel-art-style-vector.jpg");
    background-repeat: no-repeat;
    background-position: center left;
    background-size: auto 100%;
  }
  .monaco-editor .monaco-hover .hover-contents {
    border-radius: 10px !important;
    padding: 0 !important;
  }
  /* First hover row (title) with purple background */
  .monaco-editor .monaco-hover .hover-contents .hover-row:first-child {
    /* Match spell-class token appearance: subtle purple background and purple text */
    background: rgba(164, 107, 255, 0.13) !important;
    color: hsl(263, 100%, 71%) !important;
    padding: 10px 14px !important; /* slightly bigger area */
    font-weight: 700;
    font-size: 13px !important;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    border-top-left-radius: 10px !important;
    border-top-right-radius: 10px !important;
  }
  /* Rest of hover content padding */
  .monaco-editor .monaco-hover .hover-contents .hover-row:not(:first-child) {
    padding: 8px 10px !important;
    color: var(--vscode-editor-foreground, #d4d4d4) !important;
    background: transparent !important;
  }
  /* Overlay element for right-side animated GIF. We'll append a DOM node so we can layer it between editor background and text. */
  #editor .editor-gif-overlay {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 40%;
    pointer-events: none;
    z-index: 6; /* will be placed below text which we set to a higher z-index */
    background-image: url('https://cdna.artstation.com/p/assets/images/images/017/778/384/original/evgeny-starostin-static.gif?1557313040');
    background-repeat: no-repeat;
    /* shift the GIF left ~10% (90% from left) so it sits a bit more inward */
    background-position: 110% center;
    background-size: cover;
    opacity: 0.35;
    /* small blur and GPU hints to reduce flicker from GIF transparency lines */
    filter: blur(0.35px);
    will-change: opacity, transform;
    transform: translateZ(0);
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    image-rendering: crisp-edges;
    -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%);
    mask-image: linear-gradient(to left, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%);
  }
  /* Ensure monaco text layer sits above the overlay */
  .monaco-editor .view-lines { position: relative; z-index: 10; }
</style>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.40.0/min/vs/loader.js"></script>
</head>
<body>
<div id="editor"></div>
<div id="status">Loading editor...</div>

<script>
require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.40.0/min/vs' }});

function startMonacoIfYamlReady() {
  if (typeof jsyaml === 'undefined' && typeof window.jsyaml === 'undefined') {
    setTimeout(startMonacoIfYamlReady, 100);
    return;
  }
  require(['vs/editor/editor.main'], function() {
    const statusEl = document.getElementById('status');
    let schema = {};
    // Helper to collect global options from schema entries that represent global/common options.
    function getGlobalOptions() {
      // built-in global options (fallbacks) — these apply to all spells unless overridden in schema
      const builtins = {
        '%arg': { type: 'string', description: 'References an argument passed when the spell was cast as a sub-spell or by a player.\n\nExample: `/cast spell arg1 -> %arg:1:DEFAULT%`' },
        'cooldown': { type: 'number', description: 'Number of seconds before this spell can be used again. Decimals allowed (e.g., 0.5 = half second).' },
        'str-cast-self': { type: 'string', description: 'Message sent to caster when a spell is cast.' },
        'str-cast-others': { type: 'string', description: 'Message sent to other players when a spell is cast.' },
        'str-no-target': { type: 'string', description: 'Message sent to caster when attempting to cast without a valid target.' },
        'str-on-cooldown': { type: 'string', description: 'Message sent to caster when attempting to cast while spell is on cooldown.' }
      };
      const candidateNames = ['modifiers','Modifiers','global','Global','__global','GLOBAL','*','AllSpells','GlobalSpell','globalOptions'];
      const merged = Object.assign({}, builtins);
      for (const n of candidateNames) {
        if (schema && schema[n] && schema[n].options) {
          Object.assign(merged, schema[n].options);
        }
      }
      return merged;
    }

    fetch('schema.json')
      .then(res => res.json())
      .then(data => {
        schema = data;
        statusEl.textContent = 'Schema loaded ✅';
        statusEl.style.color = '#0f0';
      })
      .catch(err => {
        console.error(err);
        statusEl.textContent = 'Failed to load schema ❌';
        statusEl.style.color = '#f44';
      });

    const editor = monaco.editor.create(document.getElementById('editor'), {
      value: `Shout_Banner:
  spell-class: ".instant.DummySpell"
  description: "Shout a message above your head. Format /c Shout \\\"MESSAGE_IN_QUOTES\\\" HEXCOLOR1 HEXCOLOR2 END_SIZE"
  str-cast-self: "You shout your message!"
  cooldown: "3*%arg:4:1%"
  modifiers:
    - onground required$$You must be on the ground to cast this spell!
  effects:
    - position: caster
      effect: entity
      entity:
          duration: 200
          entity: text_display
          text: "<transition:%arg:2:white%:%arg:3:gold%:0.25>%arg:1:*crickets*%"
          brightness:
            sky: 15
            block: 15
          interpolation-delay: 0
          interpolation-duration: 15
          teleport-duration: 1
          background: 0000000
          billboard: center
          transformation:
            left-rotation: "0,0,0,1"
            right-rotation: "0,0,0,1"
            scale:
              x: "0.1"
              y: "0.1"
              z: "0.1"
            translation:
              x: "0"
              y: "1"
              z: "0"
          delayed-entity-data:
            - delay: 2
              entity-data:
                text: "<transition:%arg:2:white%:%arg:3:gold%:0.25>%arg:1:*crickets*%"
                interpolation-delay: 0
                interpolation-duration: 200
                transformation:
                  left-rotation: "0,0,0,1"
                  right-rotation: "0,0,0,1"
                  scale:
                    x: "%arg:4:0.8%"
                    y: "%arg:4:0.8%"
                    z: "%arg:4:0.8%"
                  translation:
                    x: "0"
                    y: "2"
                    z: "0"`,
      language: 'yaml',
      theme: 'vs-dark',
      automaticLayout: true
    });

    // Completion provider: suggest registry values (particles, biomes, sounds, items, etc.)
    monaco.languages.registerCompletionItemProvider('yaml', {
      provideCompletionItems: function(model, position) {
        // if schema or registries not loaded yet, no suggestions
        if (!schema || !schema.registries) return { suggestions: [] };

        const word = model.getWordUntilPosition(position) || { word: '', startColumn: position.column, endColumn: position.column };
        const line = model.getLineContent(position.lineNumber);

        // derive a key-like token at the cursor (reuse getFullKey logic)
        function getFullKeyAtPos() {
          const col = position.column - 1; // zero-based
          if (col < 0 || col > line.length) return word.word || null;
          const isKeyChar = c => /[A-Za-z0-9_\-]/.test(c);
          if (!isKeyChar(line[col])) {
            if (word && word.word) return word.word;
            return null;
          }
          let left = col;
          while (left - 1 >= 0 && isKeyChar(line[left - 1])) left--;
          let right = col;
          while (right + 1 < line.length && isKeyChar(line[right + 1])) right++;
          return line.substring(left, right + 1);
        }

        const key = (getFullKeyAtPos() || '').toLowerCase();
        if (!key) return { suggestions: [] };

        const suggestions = [];
        // simple heuristic: if key matches or contains a registry name, suggest from that registry
        for (const regKey of Object.keys(schema.registries)) {
          if (key === regKey || key.includes(regKey) || regKey.includes(key) || key.endsWith(regKey)) {
            const list = schema.registries[regKey] || [];
            for (const id of list) {
              suggestions.push({
                label: id,
                kind: monaco.languages.CompletionItemKind.Value,
                insertText: '"' + id + '"',
                documentation: `${regKey} registry value`,
                range: new monaco.Range(position.lineNumber, word.startColumn, position.lineNumber, word.endColumn)
              });
            }
            // prefer exact registry match; stop after filling suggestions for this registry
            if (key === regKey) break;
          }
        }

        return { suggestions };
      }
    });

    // Add the GIF overlay element so it can be layered between the editor background and the text layer
    try {
      const editorContainer = document.getElementById('editor');
      const gifOverlay = document.createElement('div');
      gifOverlay.className = 'editor-gif-overlay';
      editorContainer.appendChild(gifOverlay);
    } catch (e) {
      console.error('Failed to append editor GIF overlay', e);
    }

    // Decorations for highlighting spell-class values
    let spellClassDecorationIds = [];
    function updateSpellClassDecorations() {
      const model = editor.getModel();
      if (!model) return;
      const newDecs = [];
      const lineCount = model.getLineCount();
      const regex = /spell-class\s*:\s*['\"]?([.A-Za-z0-9]+)['\"]?/g;
      for (let i = 1; i <= lineCount; i++) {
        const line = model.getLineContent(i);
        let m;
        // Run regex on the line
        while ((m = regex.exec(line)) !== null) {
          const val = m[1];
          const valueIndex = line.indexOf(val, m.index);
          if (valueIndex >= 0) {
            // Try to include surrounding quotes in the decoration range if present
            let startIndex = valueIndex;
            let endIndex = valueIndex + val.length - 1;
            // look for a quote before
            const singleBefore = line.lastIndexOf("'", valueIndex);
            const doubleBefore = line.lastIndexOf('"', valueIndex);
            const quoteBefore = Math.max(singleBefore, doubleBefore);
            if (quoteBefore >= m.index) startIndex = quoteBefore;
            // look for a quote after
            const singleAfter = line.indexOf("'", valueIndex + val.length);
            const doubleAfter = line.indexOf('"', valueIndex + val.length);
            const quoteAfterCandidates = [singleAfter, doubleAfter].filter(x => x !== -1);
            if (quoteAfterCandidates.length) {
              const quoteAfter = Math.min(...quoteAfterCandidates);
              if (quoteAfter > endIndex) endIndex = quoteAfter;
            }
              const lineMax = model.getLineMaxColumn(i);
              let startCol = startIndex + 1; // monaco is 1-based
              let endCol = endIndex + 2; // convert inclusive endIndex to 1-based exclusive-ish
              // clamp within the line bounds to avoid ranges past line end
              if (startCol < 1) startCol = 1;
              if (endCol > lineMax) endCol = lineMax;
              if (endCol <= startCol) endCol = Math.min(startCol + 1, lineMax);
              // keep exact range matching the quoted string (no extra widening)
              newDecs.push({ range: new monaco.Range(i, startCol, i, endCol), options: { inlineClassName: 'spell-class-token' } });
          }
        }
      }
      spellClassDecorationIds = editor.deltaDecorations(spellClassDecorationIds, newDecs);
    }

    // Update decorations after init and on content change
    updateSpellClassDecorations();
    let spellNameDecorationIds = [];
    let percentDecorationIds = [];
    let hexDecorationIds = [];
    function updateSpellNameDecorations() {
      const model = editor.getModel();
      if (!model) return;
      const newDecs = [];
      const lineCount = model.getLineCount();
      const topKeyRegex = /^([A-Za-z0-9_\-]+)\s*:/;
      for (let i = 1; i <= lineCount; i++) {
        const line = model.getLineContent(i);
        const m = line.match(topKeyRegex);
        if (m && line.trim().length && line[0] !== ' ' && line[0] !== '\t') {
          const key = m[1];
          const lineMax = model.getLineMaxColumn(i);
          const startCol = (m.index || 0) + 1;
          let endCol = startCol + key.length; // cover exactly the key characters
          if (endCol > lineMax) endCol = lineMax;
          if (endCol <= startCol) endCol = Math.min(startCol + 1, lineMax);
          if (endCol < lineMax) endCol = Math.min(endCol + 2, lineMax);
          newDecs.push({ range: new monaco.Range(i, startCol, i, endCol), options: { inlineClassName: 'spell-name-token' } });
        }
      }
      spellNameDecorationIds = editor.deltaDecorations(spellNameDecorationIds, newDecs);
    }
    function updatePercentDecorations() {
      const model = editor.getModel();
      if (!model) return;
      const newDecs = [];
      const lineCount = model.getLineCount();
      // Match single-percent tokens like %a, %t, %t_uuid only when NOT followed by ':'
      // Otherwise match percent-wrapped tokens like %arg:1% (allows whitespace inside)
      const regex = /%[A-Za-z0-9_]+(?:_[A-Za-z0-9_]+)*(?!:)|%[^%]+%/g;
      for (let i = 1; i <= lineCount; i++) {
        const line = model.getLineContent(i);
        let m;
        while ((m = regex.exec(line)) !== null) {
          const matchText = m[0];
          const startIndex = m.index; // zero-based
          // Use the exact %...% span so highlights begin and end on the percent signs
          const startCol = startIndex + 1;
          const lineMax = model.getLineMaxColumn(i);
          let endCol = startIndex + matchText.length + 1; // exclusive end
          if (endCol > lineMax) endCol = lineMax;
          if (endCol <= startCol) endCol = Math.min(startCol + 1, lineMax);
          // Inspect token prefix to assign specialized classes: %var, %papi, %arg, or single-percent like %a/%t
          let cls = 'percent-token';
          try {
            let inner;
            let prefix;
            if (matchText.startsWith('%') && matchText.endsWith('%')) {
              inner = matchText.slice(1, -1); // remove surrounding %
              prefix = inner.split(':')[0].toLowerCase();
            } else {
              inner = matchText.slice(1); // single-percent token
              // treat underscores or trailing parts as suffixes (e.g. t_uuid)
              prefix = inner.split(/[:_]/)[0].toLowerCase();
            }
            if (prefix === 'var' || prefix === 'castervar' || prefix === 'targetvar' || prefix === 'playervar') cls = 'percent-var';
            else if (prefix === 'papi' || prefix === 'casterpapi' || prefix === 'targetpapi' || prefix === 'playerpapi') cls = 'percent-papi';
            else if (prefix === 'a') cls = 'percent-a';
            else if (prefix === 't') cls = 'percent-t';
            // keep %arg and other forms as default percent-token
          } catch (e) {}
          newDecs.push({ range: new monaco.Range(i, startCol, i, endCol), options: { inlineClassName: cls } });
        }
      }
      percentDecorationIds = editor.deltaDecorations(percentDecorationIds, newDecs);
    }

    // Add decorations for any #hex color anywhere in the document
    function updateHexDecorations() {
      const model = editor.getModel();
      if (!model) return;
      const newDecs = [];
      const lineCount = model.getLineCount();
      const regex = /#([0-9a-fA-F]{6}|[0-9a-fA-F]{3})\b/g;
      // ensure a style element exists to hold generated classes
      let styleEl = document.getElementById('hex-color-styles');
      if (!styleEl) {
        styleEl = document.createElement('style');
        styleEl.id = 'hex-color-styles';
        document.head.appendChild(styleEl);
        window.__hexClasses = new Set();
      }
      for (let i = 1; i <= lineCount; i++) {
        const line = model.getLineContent(i);
        let m;
        while ((m = regex.exec(line)) !== null) {
          const matchText = m[0];
          const startIndex = m.index;
          const startCol = startIndex + 1;
          const lineMax = model.getLineMaxColumn(i);
          let endCol = startIndex + matchText.length + 1;
          if (endCol > lineMax) endCol = lineMax;
          if (endCol <= startCol) endCol = Math.min(startCol + 1, lineMax);
          let hex = m[1];
          if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
          hex = hex.toLowerCase();
          const className = 'hex-bg-' + hex;
          if (!window.__hexClasses.has(className)) {
            const r = parseInt(hex.substring(0,2), 16) / 255;
            const g = parseInt(hex.substring(2,4), 16) / 255;
            const b = parseInt(hex.substring(4,6), 16) / 255;
            const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
            const textColor = lum > 0.6 ? '#000' : '#fff';
            const rule = `.monaco-editor .${className} { background-image: none !important; background-color: #${hex} !important; color: ${textColor} !important; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.12) !important; }`;
            styleEl.appendChild(document.createTextNode(rule));
            window.__hexClasses.add(className);
          }
          newDecs.push({ range: new monaco.Range(i, startCol, i, endCol), options: { inlineClassName: className } });
        }
      }
      hexDecorationIds = editor.deltaDecorations(hexDecorationIds, newDecs);
    }

    updateSpellNameDecorations();
    updatePercentDecorations();
    updateHexDecorations();
    editor.onDidChangeModelContent(() => {
      updateSpellClassDecorations();
      updateSpellNameDecorations();
      updatePercentDecorations();
      updateHexDecorations();
    });

    function findParentKey(model, lineNumber) {
      for (let i = lineNumber - 1; i > 0; i--) {
        const line = model.getLineContent(i).trim();
        const match = line.match(/^([\w-]+):/);
        if (match && !line.startsWith('-')) {
          if (i !== 1) return match[1];
        }
      }
      return null;
    }

    monaco.languages.registerHoverProvider('yaml', {
      provideHover: function(model, position) {
        const word = model.getWordAtPosition(position);
        // If Monaco word splitting breaks on hyphen, extract a full key including hyphens
        function getFullKey() {
          const line = model.getLineContent(position.lineNumber);
          const col = position.column - 1; // zero-based index
          if (col < 0 || col > line.length) return word ? word.word : null;
          // allowed key chars: letters, numbers, underscore, hyphen
          const isKeyChar = c => /[A-Za-z0-9_\-]/.test(c);
          let left = col;
          // If cursor is on whitespace between key and value, try to use word
          if (!isKeyChar(line[left])) {
            if (word && word.word) return word.word;
            return null;
          }
          // expand left
          while (left - 1 >= 0 && isKeyChar(line[left - 1])) left--;
          let right = col;
          while (right + 1 < line.length && isKeyChar(line[right + 1])) right++;
          return line.substring(left, right + 1);
        }

        const key = getFullKey();
        if (!key) return null;

        const line = model.getLineContent(position.lineNumber);

        // Helper: find a %...% token on the current line that contains the cursor
        function findPercentTokenAtPos() {
          // match single-percent tokens like %a, %t, %t_uuid only when NOT followed by ':'
          // or percent-wrapped tokens (allows spaces/quotes inside)
          const regex = /%[A-Za-z0-9_]+(?:_[A-Za-z0-9_]+)*(?!:)|%[^%]+%/g;
          let m;
          while ((m = regex.exec(line)) !== null) {
            const start = m.index; // zero-based
            const end = m.index + m[0].length; // exclusive
            const col0 = position.column - 1; // zero-based
            if (col0 >= start && col0 < end) {
              return { text: m[0], startCol: start + 1, endCol: end + 1 };
            }
          }
          return null;
        }

        // If hovering inside a percent token, provide specific docs
        const pct = findPercentTokenAtPos();
        if (pct) {
          let inner;
          let prefix;
          if (pct.text.startsWith('%') && pct.text.endsWith('%')) {
            inner = pct.text.slice(1, -1);
            prefix = inner.split(':')[0].toLowerCase();
          } else {
            inner = pct.text.slice(1);
            prefix = inner.split(/[:_]/)[0].toLowerCase();
          }
          const contents = [];
          if (prefix === 'arg') {
            contents.push({ value: '**%arg:INDEX:DEFAULT%** — Cast argument' });
            contents.push({ value: 'Returns the spell cast argument at `INDEX` (1-based). If the argument is missing, `DEFAULT` is used.' });
            contents.push({ value: 'Example: `%arg:1:x%` — use the first argument or `x` if not provided.' });
          } else if (prefix === 'var' || prefix === 'castervar' || prefix === 'targetvar' || prefix === 'playervar') {
            contents.push({ value: `**%${prefix}:<varName>:[precision]%** — Variable placeholder` });
            contents.push({ value: 'Returns a stored variable value for the recipient (or the named scope). `precision` (optional) controls decimal places.' });
            contents.push({ value: 'Notes: variable placeholders do not work for non-player entities unless the variable is global.' });
            contents.push({ value: 'Example: `%var:meta_current_health:0%` — current health rounded to 0 decimals.' });
          } else if (prefix === 'papi' || prefix === 'casterpapi' || prefix === 'targetpapi' || prefix === 'playerpapi') {
            contents.push({ value: `**%${prefix}:<placeholder>%** — PlaceholderAPI (PAPI)` });
            contents.push({ value: 'Resolves a PlaceholderAPI placeholder parsed against the recipient (or specified player). Supports inner PAPI placeholders using `{}`.' });
            contents.push({ value: 'Example: `%papi:player_name%`, or nested `%papi:ms_cooldown_now_{ms_selectedspell},0%`.' });
            contents.push({ value: 'PAPI expansions may be resolved for non-player entities depending on the expansion.' });
          } else if (prefix === 'a') {
            contents.push({ value: '**%a** — Caster entity name' });
            contents.push({ value: 'Replaced with the caster (source) entity name when the spell is executed.' });
            contents.push({ value: 'Example: `%a cast fireball` → `DragonsAscent cast fireball`' });
            contents.push({ value: 'Also supports suffixes like `%a_uuid` for the caster UUID.' });
          } else if (prefix === 't') {
            contents.push({ value: '**%t** — Target entity name' });
            contents.push({ value: 'Replaced with the spell target entity name when applicable.' });
            contents.push({ value: 'Example: `You hit %t` → `You hit Villager123`' });
            contents.push({ value: 'Also supports suffixes like `%t_uuid` for the target UUID.' });
          } else {
            // generic percent token info
            contents.push({ value: `**${pct.text}** — Placeholder / token` });
            contents.push({ value: 'This is a MagicSpells placeholder token. Supported prefixes include `%arg`, `%var`, `%papi`, and scope variants like `castervar` or `casterpapi`.' });
          }
          return { range: new monaco.Range(position.lineNumber, pct.startCol, position.lineNumber, pct.endCol), contents };
        }

        // Helper: get YAML-parsed object
        function parseYaml() {
          try {
            const yamlLib = typeof jsyaml !== 'undefined' ? jsyaml : window.jsyaml;
            if (!yamlLib) return null;
            return yamlLib.load(model.getValue()) || {};
          } catch (e) {
            return null;
          }
        }

        // Case 1: hovering over a spell-class value — show full options list
        const spellClassLineMatch = line.match(/spell-class\s*:\s*['\"]?([.a-zA-Z0-9]+)['\"]?/);
        if (spellClassLineMatch && line.includes(key)) {
          const classStr = spellClassLineMatch[1];
          const parts = classStr.split('.').filter(Boolean);
          const className = parts[parts.length - 1];
          if (schema[className]) {
            const opts = schema[className].options || {};
            const keys = Object.keys(opts);
            const contents = [];
            contents.push({ value: `**${className}** (${parts[0] ?? 'unknown'})` });
            if (keys.length) {
              // Add a markdown list of all options
              for (const k of keys) {
                const o = opts[k] || {};
                const t = o.type || 'any';
                const d = o.description ? o.description.replace(/\n/g, ' ') : '';
                contents.push({ value: `- **${k}** (${t}) — ${d}` });
              }
            } else {
              contents.push({ value: 'No options documented.' });
            }
            return {
              range: new monaco.Range(position.lineNumber, word ? word.startColumn : 1, position.lineNumber, word ? word.endColumn : key.length + 1),
              contents
            };
          }
        }

        // Case 2: hovering over an option inside a spell instance - find instance's spell-class
        const parentKey = findParentKey(model, position.lineNumber);
        // If we're hovering over an item inside a modifiers list, provide condition/action help
        if (parentKey && ['modifiers', 'target-modifiers', 'location-modifiers'].includes(parentKey)) {
          const rawLine = model.getLineContent(position.lineNumber).trim();
          if (rawLine.startsWith('-')) {
            const itemText = rawLine.replace(/^-\s*/, '');
            const parts = itemText.split(/\s+/);
            if (parts.length) {
              let cond = parts[0];
              let inverted = false;
              if (cond.startsWith('!')) { inverted = true; cond = cond.slice(1); }
              const contents = [];
              contents.push({ value: `**Modifier condition:** ${cond}${inverted ? ' (inverted)' : ''}` });
              // try to find a description from the generated schema modifiers entry
              try {
                const condEntry = schema && schema['modifiers'] && schema['modifiers'].options && schema['modifiers'].options[cond];
                if (condEntry && condEntry.description) contents.push({ value: condEntry.description });
              } catch (e) {}
              contents.push({ value: 'This condition is evaluated against the caster (or target for `target-modifiers`).\nExample: `- onground required$$You must be on the ground to cast this spell!`\n       - `day denied`' });
              return { range: new monaco.Range(position.lineNumber, 1, position.lineNumber, model.getLineMaxColumn(position.lineNumber)), contents };
            }
          }
        }
        if (parentKey) {
          const doc = parseYaml();
          if (doc && doc[parentKey]) {
            const inst = doc[parentKey];
            const sc = inst['spell-class'] || inst['spell_class'] || inst['class'];
            if (sc && typeof sc === 'string') {
              const classParts = sc.split('.').filter(Boolean);
              const className = classParts[classParts.length - 1];
              if (schema[className]) {
                const options = schema[className].options || {};
                if (options[key]) {
                  const opt = options[key];
                  return {
                    range: new monaco.Range(position.lineNumber, word.startColumn, position.lineNumber, word.endColumn),
                    contents: [
                      { value: `**${word.word}** (${opt.type})` },
                      { value: `${opt.description}` },
                      { value: `Default: ${opt.default ?? 'none'}` }
                    ]
                  };
                }
              }
            }
          }
        }

        // Modifier help: `modifiers` and `target-modifiers` describe condition lists
        if (key === 'modifiers' || key === 'target-modifiers' || key === 'location-modifiers') {
          const startCol = word && word.startColumn ? word.startColumn : Math.max(1, position.column - key.length);
          const endCol = word && word.endColumn ? word.endColumn : startCol + key.length;
          const actionsList = ['  `required`/`require`','  `denied`/`deny`','  `power`/`empower`/`multiply`','  `addpower`/`add`','  `cooldown`','  `reagents`','  `casttime`','  `stop`','  `continue`','  `cast`','  `castinstead`','  `variable`','  `string`','  `message`'];
          const contents = [];
          contents.push({ value: `**${key}** (list of conditions)` });
          contents.push({ value: 'A YAML list where each item is a condition that modifies casting. Conditions can include comparison operators and `required` to enforce them.' });
          contents.push({ value: '**Modifier actions (when a condition passes):**' });
          for (const a of actionsList) contents.push({ value: `- ${a}` });
          contents.push({ value: 'Examples:' });
          contents.push({ value: '- `- onground required` (caster/target must be on ground to cast)\n- `- health >10 required` (caster/target must have health > 10)' });
          return { range: new monaco.Range(position.lineNumber, startCol, position.lineNumber, endCol), contents };
        }
        // Fallback: global option lookup across all spells (unchanged)
        // First check a merged global options entry (if present in the schema)
        const globalOptions = getGlobalOptions();
        if (globalOptions && globalOptions[key]) {
          const opt = globalOptions[key];
          return {
            range: new monaco.Range(position.lineNumber, word.startColumn, position.lineNumber, word.endColumn),
            contents: [
              { value: `**${key}** (${opt.type}) — global` },
              { value: `${opt.description}` },
              { value: `Default: ${opt.default ?? 'none'}` }
            ]
          };
        }
        // Otherwise search per-spell options as a fallback
        for (const spellName in schema) {
          const options = schema[spellName].options;
          if (options && options[key]) {
            const opt = options[key];
            return {
              range: new monaco.Range(position.lineNumber, word.startColumn, position.lineNumber, word.endColumn),
              contents: [
                { value: `**${key}** (${opt.type})` },
                { value: `${opt.description}` },
                { value: `Default: ${opt.default ?? 'none'}` }
              ]
            };
          }
        }

        return null;
      }
    });

    editor.onDidChangeModelContent(() => {
      const yamlText = editor.getValue();
      try {
        const yamlLib = typeof jsyaml !== 'undefined' ? jsyaml : window.jsyaml;
        if (!yamlLib) throw new Error('jsyaml is not defined');
        yamlLib.load(yamlText);
        statusEl.textContent = 'Config is valid ✅';
        statusEl.style.color = '#0f0';
      } catch (err) {
        statusEl.textContent = 'Error ❌: ' + err.message;
        statusEl.style.color = '#f44';
      }
    });
  });
}
startMonacoIfYamlReady();
</script>
</body>
</html>
