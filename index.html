<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Scribe</title>
<style>
  body, html { margin:0; padding:0; height:100%; display:flex; flex-direction:column; font-family:sans-serif; }
  #editor { flex:1; }
  #status {
    position: fixed;
    right: 16px;
    bottom: 16px;
    max-width: 480px;
    max-height: 240px;
    overflow: auto;
    padding: 12px 14px;
    background: rgba(30,30,30,0.95);
    color: #d4d4d4;
    font-family: monospace;
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    white-space: pre-wrap;
    z-index: 10000;
    font-size: 13px;
  }
  /* Inline token style with embedded icon inside the highlighted background */
  .monaco-editor .spell-class-token {
    color:hsl(263, 100%, 71%) !important;
    font-weight: 500;
    background-color:rgba(164, 107, 255, 0.13) !important;
    border-radius:4px;
    /* icon inside background */
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='12' height='12'><path fill='%23a46bff' d='M12 2l4 6 6 2-10 7-10-7 6-2 4-6z'/></svg>");
    background-repeat: no-repeat;
    background-position: 6px center;
    background-size: 12px 12px;
    padding-right: 0 !important;
    line-height: 18px;
  }
  /* Percent-wrapped token (e.g., %arg:4:1%) */
  .monaco-editor .percent-token {
    color: rgb(177, 130, 159) !important;
    background-color: rgba(235, 149, 235, 0.03) !important;
    /* repeating diagonal stripe pattern for better contrast */
    background-image: repeating-linear-gradient(45deg,
      rgba(235, 149, 235, 0.1) 0px, rgba(235, 149, 235, 0.1) 4px,
      rgba(54, 54, 54, 0.02) 4px, rgba(54, 54, 54, 0.02) 8px);
    background-size: 8px 8px;
    border-radius: 4px;
    text-shadow: 0 0 8px rgba(151, 81, 124, 0.205);
    padding-left: 4px !important;
    padding-right: 0 !important;
  }
  /* First-line spell name token */
  .monaco-editor .spell-name-token {
    color: hsl(162, 74%, 33%) !important;
    font-weight: 700;
    background-color: rgba(63, 255, 175, 0.103) !important;
    border-radius: 4px;
    line-height: 20px;
    padding-right: 0 !important;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.40.0/min/vs/loader.js"></script>
</head>
<body>
<div id="editor"></div>
<div id="status">Loading editor...</div>

<script>
require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.40.0/min/vs' }});

function startMonacoIfYamlReady() {
  if (typeof jsyaml === 'undefined' && typeof window.jsyaml === 'undefined') {
    setTimeout(startMonacoIfYamlReady, 100);
    return;
  }
  require(['vs/editor/editor.main'], function() {
    const statusEl = document.getElementById('status');
    let schema = {};
    // Helper to collect global options from schema entries that represent global/common options.
    function getGlobalOptions() {
      // built-in global options (fallbacks) — these apply to all spells unless overridden in schema
      const builtins = {
        'cooldown': { type: 'number', description: 'Number of seconds before this spell can be used again. Decimals allowed (e.g., 0.5 = half second).' },
        'str-cast-self': { type: 'string', description: 'Message sent to caster when a spell is cast.' },
        'str-cast-others': { type: 'string', description: 'Message sent to other players when a spell is cast.' },
        'str-no-target': { type: 'string', description: 'Message sent to caster when attempting to cast without a valid target.' },
        'str-on-cooldown': { type: 'string', description: 'Message sent to caster when attempting to cast while spell is on cooldown.' }
      };
      const candidateNames = ['modifiers','Modifiers','global','Global','__global','GLOBAL','*','AllSpells','GlobalSpell','globalOptions'];
      const merged = Object.assign({}, builtins);
      for (const n of candidateNames) {
        if (schema && schema[n] && schema[n].options) {
          Object.assign(merged, schema[n].options);
        }
      }
      return merged;
    }

    fetch('schema.json')
      .then(res => res.json())
      .then(data => {
        schema = data;
        statusEl.textContent = 'Schema loaded ✅';
        statusEl.style.color = '#0f0';
      })
      .catch(err => {
        console.error(err);
        statusEl.textContent = 'Failed to load schema ❌';
        statusEl.style.color = '#f44';
      });

    const editor = monaco.editor.create(document.getElementById('editor'), {
      value: `Shout_Banner:
  spell-class: ".instant.DummySpell"
  description: "Shout a message above your head. Format /c Shout \\\"MESSAGE_IN_QUOTES\\\" HEXCOLOR1 HEXCOLOR2 END_SIZE"
  str-cast-self: "You shout your message!"
  cooldown: "3*%arg:4:1%"
  modifiers:
    - onground required$$You must be on the ground to cast this spell!
  effects:
    - position: caster
      effect: entity
      entity:
          duration: 200
          entity: text_display
          text: "<transition:%arg:2:white%:%arg:3:gold%:0.25>%arg:1:*crickets*%"
          brightness:
            sky: 15
            block: 15
          interpolation-delay: 0
          interpolation-duration: 15
          teleport-duration: 1
          background: 0000000
          billboard: center
          transformation:
            left-rotation: "0,0,0,1"
            right-rotation: "0,0,0,1"
            scale:
              x: "0.1"
              y: "0.1"
              z: "0.1"
            translation:
              x: "0"
              y: "1"
              z: "0"
          delayed-entity-data:
            - delay: 2
              entity-data:
                text: "<transition:%arg:2:white%:%arg:3:gold%:0.25>%arg:1:*crickets*%"
                interpolation-delay: 0
                interpolation-duration: 200
                transformation:
                  left-rotation: "0,0,0,1"
                  right-rotation: "0,0,0,1"
                  scale:
                    x: "%arg:4:0.8%"
                    y: "%arg:4:0.8%"
                    z: "%arg:4:0.8%"
                  translation:
                    x: "0"
                    y: "2"
                    z: "0"`,
      language: 'yaml',
      theme: 'vs-dark',
      automaticLayout: true
    });

    // Decorations for highlighting spell-class values
    let spellClassDecorationIds = [];
    function updateSpellClassDecorations() {
      const model = editor.getModel();
      if (!model) return;
      const newDecs = [];
      const lineCount = model.getLineCount();
      const regex = /spell-class\s*:\s*['\"]?([.A-Za-z0-9]+)['\"]?/g;
      for (let i = 1; i <= lineCount; i++) {
        const line = model.getLineContent(i);
        let m;
        // Run regex on the line
        while ((m = regex.exec(line)) !== null) {
          const val = m[1];
          const valueIndex = line.indexOf(val, m.index);
          if (valueIndex >= 0) {
            // Try to include surrounding quotes in the decoration range if present
            let startIndex = valueIndex;
            let endIndex = valueIndex + val.length - 1;
            // look for a quote before
            const singleBefore = line.lastIndexOf("'", valueIndex);
            const doubleBefore = line.lastIndexOf('"', valueIndex);
            const quoteBefore = Math.max(singleBefore, doubleBefore);
            if (quoteBefore >= m.index) startIndex = quoteBefore;
            // look for a quote after
            const singleAfter = line.indexOf("'", valueIndex + val.length);
            const doubleAfter = line.indexOf('"', valueIndex + val.length);
            const quoteAfterCandidates = [singleAfter, doubleAfter].filter(x => x !== -1);
            if (quoteAfterCandidates.length) {
              const quoteAfter = Math.min(...quoteAfterCandidates);
              if (quoteAfter > endIndex) endIndex = quoteAfter;
            }
              const lineMax = model.getLineMaxColumn(i);
              let startCol = startIndex + 1; // monaco is 1-based
              let endCol = endIndex + 2; // convert inclusive endIndex to 1-based exclusive-ish
              // clamp within the line bounds to avoid ranges past line end
              if (startCol < 1) startCol = 1;
              if (endCol > lineMax) endCol = lineMax;
              if (endCol <= startCol) endCol = Math.min(startCol + 1, lineMax);
              // keep exact range matching the quoted string (no extra widening)
              newDecs.push({ range: new monaco.Range(i, startCol, i, endCol), options: { inlineClassName: 'spell-class-token' } });
          }
        }
      }
      spellClassDecorationIds = editor.deltaDecorations(spellClassDecorationIds, newDecs);
    }

    // Update decorations after init and on content change
    updateSpellClassDecorations();
    let spellNameDecorationIds = [];
    let percentDecorationIds = [];
    function updateSpellNameDecorations() {
      const model = editor.getModel();
      if (!model) return;
      const newDecs = [];
      const lineCount = model.getLineCount();
      const topKeyRegex = /^([A-Za-z0-9_\-]+)\s*:/;
      for (let i = 1; i <= lineCount; i++) {
        const line = model.getLineContent(i);
        const m = line.match(topKeyRegex);
        if (m && line.trim().length && line[0] !== ' ' && line[0] !== '\t') {
          const key = m[1];
          const lineMax = model.getLineMaxColumn(i);
          const startCol = (m.index || 0) + 1;
          let endCol = startCol + key.length; // cover exactly the key characters
          if (endCol > lineMax) endCol = lineMax;
          if (endCol <= startCol) endCol = Math.min(startCol + 1, lineMax);
          if (endCol < lineMax) endCol = Math.min(endCol + 2, lineMax);
          newDecs.push({ range: new monaco.Range(i, startCol, i, endCol), options: { inlineClassName: 'spell-name-token' } });
        }
      }
      spellNameDecorationIds = editor.deltaDecorations(spellNameDecorationIds, newDecs);
    }
    function updatePercentDecorations() {
      const model = editor.getModel();
      if (!model) return;
      const newDecs = [];
      const lineCount = model.getLineCount();
      const regex = /%[^%]+%/g;
      for (let i = 1; i <= lineCount; i++) {
        const line = model.getLineContent(i);
        let m;
        while ((m = regex.exec(line)) !== null) {
          const matchText = m[0];
          const startIndex = m.index; // zero-based
          // Use the exact %...% span so highlights begin and end on the percent signs
          const startCol = startIndex + 1;
          const lineMax = model.getLineMaxColumn(i);
          let endCol = startIndex + matchText.length + 1; // exclusive end
          if (endCol > lineMax) endCol = lineMax;
          if (endCol <= startCol) endCol = Math.min(startCol + 1, lineMax);
          newDecs.push({ range: new monaco.Range(i, startCol, i, endCol), options: { inlineClassName: 'percent-token' } });
        }
      }
      percentDecorationIds = editor.deltaDecorations(percentDecorationIds, newDecs);
    }
    updateSpellNameDecorations();
    updatePercentDecorations();
    editor.onDidChangeModelContent(() => {
      updateSpellClassDecorations();
      updateSpellNameDecorations();
      updatePercentDecorations();
    });

    function findParentKey(model, lineNumber) {
      for (let i = lineNumber - 1; i > 0; i--) {
        const line = model.getLineContent(i).trim();
        const match = line.match(/^([\w-]+):/);
        if (match && !line.startsWith('-')) {
          if (i !== 1) return match[1];
        }
      }
      return null;
    }

    monaco.languages.registerHoverProvider('yaml', {
      provideHover: function(model, position) {
        const word = model.getWordAtPosition(position);
        // If Monaco word splitting breaks on hyphen, extract a full key including hyphens
        function getFullKey() {
          const line = model.getLineContent(position.lineNumber);
          const col = position.column - 1; // zero-based index
          if (col < 0 || col > line.length) return word ? word.word : null;
          // allowed key chars: letters, numbers, underscore, hyphen
          const isKeyChar = c => /[A-Za-z0-9_\-]/.test(c);
          let left = col;
          // If cursor is on whitespace between key and value, try to use word
          if (!isKeyChar(line[left])) {
            if (word && word.word) return word.word;
            return null;
          }
          // expand left
          while (left - 1 >= 0 && isKeyChar(line[left - 1])) left--;
          let right = col;
          while (right + 1 < line.length && isKeyChar(line[right + 1])) right++;
          return line.substring(left, right + 1);
        }

        const key = getFullKey();
        if (!key) return null;

        const line = model.getLineContent(position.lineNumber);

        // Helper: get YAML-parsed object
        function parseYaml() {
          try {
            const yamlLib = typeof jsyaml !== 'undefined' ? jsyaml : window.jsyaml;
            if (!yamlLib) return null;
            return yamlLib.load(model.getValue()) || {};
          } catch (e) {
            return null;
          }
        }

        // Case 1: hovering over a spell-class value — show full options list
        const spellClassLineMatch = line.match(/spell-class\s*:\s*['\"]?([.a-zA-Z0-9]+)['\"]?/);
        if (spellClassLineMatch && line.includes(key)) {
          const classStr = spellClassLineMatch[1];
          const parts = classStr.split('.').filter(Boolean);
          const className = parts[parts.length - 1];
          if (schema[className]) {
            const opts = schema[className].options || {};
            const keys = Object.keys(opts);
            const contents = [];
            contents.push({ value: `**${className}** (${parts[0] ?? 'unknown'})` });
            if (keys.length) {
              // Add a markdown list of all options
              for (const k of keys) {
                const o = opts[k] || {};
                const t = o.type || 'any';
                const d = o.description ? o.description.replace(/\n/g, ' ') : '';
                contents.push({ value: `- **${k}** (${t}) — ${d}` });
              }
            } else {
              contents.push({ value: 'No options documented.' });
            }
            return {
              range: new monaco.Range(position.lineNumber, word ? word.startColumn : 1, position.lineNumber, word ? word.endColumn : key.length + 1),
              contents
            };
          }
        }

        // Case 2: hovering over an option inside a spell instance - find instance's spell-class
        const parentKey = findParentKey(model, position.lineNumber);
        // If we're hovering over an item inside a modifiers list, provide condition/action help
        if (parentKey && ['modifiers', 'target-modifiers', 'location-modifiers'].includes(parentKey)) {
          const rawLine = model.getLineContent(position.lineNumber).trim();
          if (rawLine.startsWith('-')) {
            const itemText = rawLine.replace(/^-\s*/, '');
            const parts = itemText.split(/\s+/);
            if (parts.length) {
              let cond = parts[0];
              let inverted = false;
              if (cond.startsWith('!')) { inverted = true; cond = cond.slice(1); }
              const contents = [];
              contents.push({ value: `**Modifier condition:** ${cond}${inverted ? ' (inverted)' : ''}` });
              // try to find a description from the generated schema modifiers entry
              try {
                const condEntry = schema && schema['modifiers'] && schema['modifiers'].options && schema['modifiers'].options[cond];
                if (condEntry && condEntry.description) contents.push({ value: condEntry.description });
              } catch (e) {}
              contents.push({ value: 'This condition is evaluated against the caster (or target for `target-modifiers`).' });
              contents.push({ value: 'Example: `- onground required$$You must be on the ground to cast this spell!`' });
              return { range: new monaco.Range(position.lineNumber, 1, position.lineNumber, model.getLineMaxColumn(position.lineNumber)), contents };
            }
          }
        }
        if (parentKey) {
          const doc = parseYaml();
          if (doc && doc[parentKey]) {
            const inst = doc[parentKey];
            const sc = inst['spell-class'] || inst['spell_class'] || inst['class'];
            if (sc && typeof sc === 'string') {
              const classParts = sc.split('.').filter(Boolean);
              const className = classParts[classParts.length - 1];
              if (schema[className]) {
                const options = schema[className].options || {};
                if (options[key]) {
                  const opt = options[key];
                  return {
                    range: new monaco.Range(position.lineNumber, word.startColumn, position.lineNumber, word.endColumn),
                    contents: [
                      { value: `**${word.word}** (${opt.type})` },
                      { value: `${opt.description}` },
                      { value: `Default: ${opt.default ?? 'none'}` }
                    ]
                  };
                }
              }
            }
          }
        }

        // Heuristic: keys starting with `str-` are caster-facing strings (e.g., str-cast-self, str-no-target)
        try {
          if (key && key.startsWith('str-')) {
            const startCol = word && word.startColumn ? word.startColumn : Math.max(1, position.column - key.length);
            const endCol = word && word.endColumn ? word.endColumn : startCol + key.length;
            return {
              range: new monaco.Range(position.lineNumber, startCol, position.lineNumber, endCol),
              contents: [
                { value: `**${key}** (string)` },
                { value: 'A message shown to the caster or target (e.g., cast success, no target). Depends on which `str-` key is used such as `str-no-target`, `str-cast-self`, `str-cast-others`, `str-on-cooldown`, etc' }
              ]
            };
          }
        } catch (e) {
          // ignore heuristic failures
        }

        // Modifier help: `modifiers` and `target-modifiers` describe condition lists
        if (key === 'modifiers' || key === 'target-modifiers' || key === 'location-modifiers') {
          const startCol = word && word.startColumn ? word.startColumn : Math.max(1, position.column - key.length);
          const endCol = word && word.endColumn ? word.endColumn : startCol + key.length;
          const actionsList = ['required/require','denied/deny','power/empower/multiply','addpower/add','cooldown','reagents','casttime','stop','continue','cast','castinstead','variable','string','message'];
          const contents = [];
          contents.push({ value: `**${key}** (list of conditions)` });
          contents.push({ value: 'A YAML list where each item is a condition that modifies casting. Conditions can include comparison operators and `required` to enforce them.' });
          contents.push({ value: '**Modifier actions (when a condition passes):**' });
          for (const a of actionsList) contents.push({ value: `- ${a}` });
          contents.push({ value: 'Examples:' });
          contents.push({ value: '- `- onground required` (caster/target must be on ground to cast)' });
          contents.push({ value: '- `- health >10 required` (caster/target must have health > 10)' });
          return { range: new monaco.Range(position.lineNumber, startCol, position.lineNumber, endCol), contents };
        }
        // Fallback: global option lookup across all spells (unchanged)
        // First check a merged global options entry (if present in the schema)
        const globalOptions = getGlobalOptions();
        if (globalOptions && globalOptions[key]) {
          const opt = globalOptions[key];
          return {
            range: new monaco.Range(position.lineNumber, word.startColumn, position.lineNumber, word.endColumn),
            contents: [
              { value: `**${key}** (${opt.type}) — global` },
              { value: `${opt.description}` },
              { value: `Default: ${opt.default ?? 'none'}` }
            ]
          };
        }
        // Otherwise search per-spell options as a fallback
        for (const spellName in schema) {
          const options = schema[spellName].options;
          if (options && options[key]) {
            const opt = options[key];
            return {
              range: new monaco.Range(position.lineNumber, word.startColumn, position.lineNumber, word.endColumn),
              contents: [
                { value: `**${key}** (${opt.type})` },
                { value: `${opt.description}` },
                { value: `Default: ${opt.default ?? 'none'}` }
              ]
            };
          }
        }

        return null;
      }
    });

    editor.onDidChangeModelContent(() => {
      const yamlText = editor.getValue();
      try {
        const yamlLib = typeof jsyaml !== 'undefined' ? jsyaml : window.jsyaml;
        if (!yamlLib) throw new Error('jsyaml is not defined');
        yamlLib.load(yamlText);
        statusEl.textContent = 'Config is valid ✅';
        statusEl.style.color = '#0f0';
      } catch (err) {
        statusEl.textContent = 'Error ❌: ' + err.message;
        statusEl.style.color = '#f44';
      }
    });
  });
}
startMonacoIfYamlReady();
</script>
</body>
</html>
